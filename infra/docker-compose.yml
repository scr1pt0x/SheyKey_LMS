version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_net

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_net

  minio:
    image: minio/minio:latest
    container_name: lms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lms_net

  api:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: lms_api
    restart: unless-stopped
    env_file: ../.env.prod
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - lms_net

  worker:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: lms_worker
    restart: unless-stopped
    env_file: ../.env.prod
    command: celery -A backend.tasks worker --loglevel=info --concurrency=4
    depends_on:
      - api
      - redis
      - postgres
    networks:
      - lms_net

  beat:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: lms_beat
    restart: unless-stopped
    env_file: ../.env.prod
    command: celery -A backend.tasks beat --loglevel=info
    depends_on:
      - redis
    networks:
      - lms_net

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: lms_frontend
    restart: unless-stopped
    env_file: ../.env.prod
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - lms_net

  nginx:
    image: nginx:1.27-alpine
    container_name: lms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - lms_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  lms_net:
    driver: bridge

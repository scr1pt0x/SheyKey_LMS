name: Deploy to reg.ru VPS

on:
  push:
    branches: [main]

env:
  DOCKER_COMPOSE_FILE: infra/docker-compose.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/test_payment_calculator.py tests/test_status_machine.py tests/test_auth.py -v

      - name: Type check backend
        working-directory: backend
        run: python -c "import backend.main; print('OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /srv/lms
            git pull origin main
            docker compose -f infra/docker-compose.yml pull
            docker compose -f infra/docker-compose.yml up -d --build
            docker compose -f infra/docker-compose.yml exec -T api alembic upgrade head
            echo "Deploy complete at $(date)"
